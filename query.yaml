query: |
  SELECT ID AS ID, TIMESTAMP AS TIMESTAMP, WIDTH AS WIDTH, HEIGHT AS HEIGHT, DATA AS DATA
  FROM VIDEO
  INTO KAFKA_SINK;
sinks:
  - name: KAFKA_SINK
    type: KAFKA
    schema:
      - name: ID
        type: UINT64
      - name: TIMESTAMP
        type: UINT64
      - name: WIDTH
        type: UINT64
      - name: HEIGHT
        type: UINT64
      - name: DATA
        type: VARSIZED
    config:
      brokers: 'broker:29092'
      topic: process-intelligence
      output_format: JSON
    parser_config: {}
logical:
  - name: VIDEO
    schema:
      - name: ID
        type: UINT64
      - name: TIMESTAMP
        type: UINT64
      - name: WIDTH
        type: UINT64
      - name: HEIGHT
        type: UINT64
      - name: DATA
        type: VARSIZED
physical:
  - logical: VIDEO
    type: TCP
    parser_config:
      type: CSV
      tuple_delimiter: "\n"
      field_delimiter: ","
    source_config:
      socket_host: source
      socket_port: 8080
      socket_buffer_size: 65536
      flush_interval_ms: 100
      connect_timeout_seconds: 60